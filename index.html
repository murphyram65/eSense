<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<!-- iOS FIX: viewport-fit=cover pour safe areas (notch/Dynamic Island) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<!-- iOS FIX: force la couleur de la barre Safari en noir -->
<meta name="theme-color" content="#0a0a0f"/>
<title>RespiRelax</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a0f;--teal:#5eead4;--teal-dim:rgba(94,234,212,0.15);
    --purple:#a78bfa;--amber:#fbbf24;--rose:#fb7185;
    --text:rgba(255,255,255,0.85);--text-mid:rgba(255,255,255,0.4);
    --text-dim:rgba(255,255,255,0.2);--text-faint:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.06);--card:rgba(255,255,255,0.025);
    /* iOS FIX: safe area variables */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  html{
    height:100%;overflow:hidden;
    /* iOS FIX: forcer le fond noir directement sur html pour éviter le fond blanc/rose iOS */
    background:#0a0a0f;
    overscroll-behavior:none;
  }
  body{
    height:100%;overflow:hidden;
    background:#0a0a0f;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:300;
    overscroll-behavior:none;
    /* iOS FIX: évite la bande blanche/colorée au scroll bounce */
    -webkit-overflow-scrolling:auto;
  }
  /* ── BACKGROUND ── */
  #bg{position:fixed;inset:0;pointer-events:none;z-index:0}
  #bg span{position:absolute;border-radius:50%;filter:blur(80px)}
  #bg .b1{top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(88,28,135,.22),transparent 70%)}
  #bg .b2{bottom:-20%;right:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(120,53,15,.18),transparent 70%)}
  #bg .b3{top:30%;right:20%;width:40%;height:40%;background:radial-gradient(circle,rgba(49,46,129,.12),transparent 70%)}
  /* ── LAYOUT ── */
  #app{position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0f}
  .page{display:none;flex:1;overflow-y:auto;padding:56px 24px 96px;-webkit-overflow-scrolling:touch;
    /* iOS FIX: isoler le scroll par page */
    overscroll-behavior-y:contain;
  }
  .page.active{display:block}
  /* ── TOP BAR ── */
  /* iOS FIX: safe area pour le notch */
  #top-bar{position:fixed;top:0;right:0;z-index:100;display:flex;gap:8px;
    padding:calc(14px + var(--sat)) 16px 14px}
  .top-btn{padding:5px 12px;border-radius:8px;background:rgba(255,255,255,.04);
    border:1px solid var(--border);color:var(--text-mid);font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;cursor:pointer;transition:all .25s;
    /* iOS FIX: supprime délai 300ms */
    touch-action:manipulation;}
  .top-btn:hover,.top-btn.active{background:rgba(255,255,255,.08);color:var(--text)}
  /* ── BOTTOM NAV ── */
  #nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(10,10,15,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    /* iOS FIX: safe area bas de l'écran */
    padding-bottom:var(--sab);}
  #nav ul{display:flex;justify-content:space-around;list-style:none;padding:8px 16px 12px}
  #nav li{flex:1}
  #nav button{width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;
    background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;
    border-radius:12px;transition:color .25s;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    touch-action:manipulation;}
  #nav button svg{width:20px;height:20px;stroke-width:1.5}
  #nav button.active{color:var(--teal)}
  #nav button.active svg{stroke-width:2}
  /* ── TYPOGRAPHY ── */
  h1{font-size:clamp(2rem,8vw,3rem);font-weight:200;letter-spacing:-.02em;line-height:1.1}
  .grad{background:linear-gradient(90deg,var(--teal),var(--purple),var(--amber));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--text-mid);font-weight:500}
  .sub{font-size:11px;color:var(--text-dim);margin-top:2px}
  /* ── CARDS ── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px}
  .card-teal{background:linear-gradient(135deg,rgba(94,234,212,.08),rgba(34,211,238,.04),transparent)}
  .card-purple{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(99,102,241,.04),transparent)}
  .card-rose{background:linear-gradient(135deg,rgba(251,113,133,.08),transparent)}
  .card-amber{background:linear-gradient(135deg,rgba(251,191,36,.08),transparent)}
  .icon-box{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
  /* ── HOME ── */
  .stat-row{display:flex;gap:24px;margin:24px 0}
  .stat span{font-size:28px;font-weight:200;color:rgba(255,255,255,.8)}
  .home-cards{display:flex;flex-direction:column;gap:12px}
  .home-card{border-radius:20px;border:1px solid var(--border);padding:20px;cursor:pointer;
    transition:border-color .4s,transform .2s;position:relative;overflow:hidden;text-decoration:none;display:block;
    touch-action:manipulation;}
  .home-card:active{transform:scale(.98)}
  .home-card-teal{background:linear-gradient(135deg,rgba(94,234,212,.08),rgba(34,211,238,.04),transparent)}
  .home-card-purple{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(99,102,241,.04),transparent)}
  .home-card:hover{border-color:rgba(255,255,255,.12)}
  .card-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .home-card h2{font-size:17px;font-weight:300;color:rgba(255,255,255,.9);margin-bottom:4px}
  .home-card p{font-size:12px;color:var(--text-mid);line-height:1.5;max-width:220px}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .quick-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:background .25s;
    touch-action:manipulation;}
  .quick-card:hover{background:rgba(255,255,255,.04)}
  .quick-card .emoji{font-size:22px;margin-bottom:8px}
  .quote{text-align:center;margin-top:32px;font-size:12px;color:rgba(255,255,255,.12);font-style:italic}
  .info-btn{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.04);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;transition:all .25s;flex-shrink:0;touch-action:manipulation;}
  .info-btn:hover{color:var(--teal);background:rgba(255,255,255,.07)}
  /* ── BREATHE ── */
  .breathe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .settings-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.03);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;transition:all .25s;touch-action:manipulation;}
  .settings-btn:hover,.settings-btn.open{background:rgba(255,255,255,.08);color:var(--text)}
  .settings-btn:disabled{opacity:.3;cursor:not-allowed}
  /* Breathing circle */
  .circle-wrap{display:flex;justify-content:center;align-items:center;padding:20px 0}
  .circle-outer{width:280px;height:280px;position:relative;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;border-radius:50%;transition:transform .4s ease-in-out,opacity .4s}
  .ring-1{inset:0;background:radial-gradient(circle,rgba(94,234,212,.06) 0%,transparent 70%)}
  .ring-2{inset:16px;background:radial-gradient(circle,rgba(94,234,212,.1) 0%,transparent 70%)}
  .breath-circle{width:200px;height:200px;border-radius:50%;border:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;transition:transform .1s,background .8s;
    background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
  .breath-circle.inhale{background:linear-gradient(135deg,rgba(94,234,212,.3),rgba(34,211,238,.15),rgba(94,234,212,.08))}
  .breath-circle.hold{background:linear-gradient(135deg,rgba(251,191,36,.25),rgba(251,191,36,.08))}
  .breath-circle.exhale{background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(99,102,241,.1))}
  .breath-inner{width:128px;height:128px;border-radius:50%;background:rgba(255,255,255,.02);
    border:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .phase-label{font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7)}
  .phase-timer{font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .session-timer{text-align:center;margin-top:16px}
  .session-timer span{font-size:26px;font-weight:200;color:rgba(255,255,255,.45);font-variant-numeric:tabular-nums}
  .cycle-count{font-size:10px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-top:4px}
  /* Controls */
  .controls{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 0 8px}
  .btn-main{width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .2s,background .25s;color:rgba(255,255,255,.8);touch-action:manipulation;}
  .btn-main:hover{color:#fff;transform:scale(1.05)}
  .btn-main:active{transform:scale(.95)}
  .btn-main-breathe{background:linear-gradient(135deg,rgba(94,234,212,.18),rgba(167,139,250,.15))}
  .btn-main-meditate{background:linear-gradient(135deg,rgba(167,139,250,.18),rgba(251,191,36,.12))}
  .btn-reset{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.04);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--text-mid);transition:color .25s;touch-action:manipulation;}
  .btn-reset:hover{color:var(--text)}
  /* Settings panel */
  .settings-panel{overflow:hidden;max-height:0;transition:max-height .4s ease;margin-bottom:0}
  .settings-panel.open{max-height:600px;margin-bottom:20px}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
  .preset-btn{padding:12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.02);
    text-align:left;cursor:pointer;transition:all .25s;color:var(--text);touch-action:manipulation;}
  .preset-btn span{display:block;font-size:13px;font-weight:400;color:rgba(255,255,255,.7)}
  .preset-btn small{display:block;font-size:10px;color:var(--text-dim);margin-top:2px}
  .preset-btn.active,.preset-btn:hover{background:rgba(94,234,212,.08);border-color:rgba(94,234,212,.25);color:var(--teal)}
  .preset-btn.active span,.preset-btn:hover span{color:var(--teal)}
  .slider-group{margin-bottom:16px}
  .slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;
    border-radius:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;}
  /* iOS FIX: thumb plus grand pour faciliter le touch */
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
    border-radius:50%;cursor:pointer;border:none;}
  .range-teal::-webkit-slider-thumb{background:var(--teal)}
  .range-amber::-webkit-slider-thumb{background:var(--amber)}
  .range-purple::-webkit-slider-thumb{background:var(--purple)}
  .dur-pills{display:flex;flex-wrap:wrap;gap:8px}
  .dur-pill{padding:6px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);
    font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .25s;touch-action:manipulation;}
  .dur-pill.active,.dur-pill:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:var(--text)}
  /* ── MEDITATE ── */
  .timer-wrap{display:flex;justify-content:center;padding:20px 0}
  .timer-svg{overflow:visible}
  .timer-track{fill:none;stroke:rgba(255,255,255,.04);stroke-width:2}
  .timer-prog{fill:none;stroke:url(#tg);stroke-width:2.5;stroke-linecap:round;
    transition:stroke-dashoffset .9s linear;transform:rotate(-90deg);transform-origin:130px 130px}
  .timer-display{text-align:center;margin-top:-10px}
  .timer-time{font-size:52px;font-weight:200;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:rgba(255,255,255,.88)}
  .timer-sub{font-size:10px;text-transform:uppercase;letter-spacing:.25em;color:var(--text-dim);margin-top:4px}
  /* Sound grid */
  .sound-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .sound-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
    border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.02);
    cursor:pointer;transition:all .25s;touch-action:manipulation;}
  .sound-btn:hover{background:rgba(255,255,255,.05)}
  .sound-btn.active{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3)}
  .sound-btn .s-emoji{font-size:20px}
  .sound-btn .s-name{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)}
  .sound-btn.active .s-name{color:var(--purple)}
  /* ── HISTORY ── */
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
  .stat-card .val{font-size:26px;font-weight:200;color:rgba(255,255,255,.8)}
  .stat-card .val.teal{color:rgba(94,234,212,.7)}
  .stat-card .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);margin-top:4px}
  .session-list{display:flex;flex-direction:column;gap:8px}
  .session-item{display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--border);border-radius:14px;padding:14px}
  .s-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .s-icon.breathe{background:rgba(94,234,212,.08)}
  .s-icon.meditate{background:rgba(167,139,250,.08)}
  .s-info{flex:1;min-width:0}
  .s-info .s-type{font-size:13px;color:rgba(255,255,255,.65)}
  .s-info .s-meta{font-size:10px;color:var(--text-dim);margin-top:3px}
  .s-badge{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(94,234,212,.45);font-weight:500}
  .empty-state{text-align:center;padding:64px 0}
  .empty-state p{font-size:13px;color:var(--text-dim)}
  .empty-state small{font-size:11px;color:rgba(255,255,255,.1);margin-top:6px;display:block}
  /* ── INFO ── */
  .info-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .back-btn{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.04);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;transition:all .25s;flex-shrink:0;touch-action:manipulation;}
  .back-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}
  .wave-viz{border-radius:20px;border:1px solid var(--border);background:linear-gradient(135deg,rgba(94,234,212,.08),rgba(167,139,250,.04),transparent);
    padding:24px;text-align:center;margin-bottom:16px}
  .wave-bars{display:flex;justify-content:center;align-items:flex-end;gap:4px;height:40px;margin-bottom:12px}
  .wave-bar{width:4px;border-radius:2px;background:linear-gradient(to top,rgba(94,234,212,.2),rgba(94,234,212,.7));animation:wave 2s ease-in-out infinite}
  @keyframes wave{0%,100%{height:4px}50%{height:36px}}
  .info-section{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px}
  .info-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .info-section-head .icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .info-section h2{font-size:13px;font-weight:500;color:rgba(255,255,255,.8)}
  .info-section p{font-size:13px;color:var(--text-mid);line-height:1.6}
  .benefit-dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--purple));flex-shrink:0;margin-top:5px}
  .benefit-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .benefit-row span{font-size:13px;color:var(--text-mid)}
  .cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;
    border-radius:20px;border:1px solid rgba(255,255,255,.1);
    background:linear-gradient(135deg,rgba(94,234,212,.12),rgba(167,139,250,.1));
    color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;width:100%;margin-top:6px;transition:all .25s;
    touch-action:manipulation;}
  .cta-btn:hover{color:rgba(255,255,255,.85)}
  /* ── ANIMATIONS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .page.active > *{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div id="bg"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>

<div id="top-bar">
  <button class="top-btn" id="lang-btn" onclick="toggleLang()">EN</button>
  <button class="top-btn" id="info-top-btn" onclick="showInfo()" title="Info">ⓘ</button>
</div>

<div id="app">
  <!-- ══ HOME ══ -->
  <div class="page active" id="page-home">
    <h1 id="h-find"></h1>
    <p style="font-size:13px;color:var(--text-mid);margin-top:8px;max-width:280px;line-height:1.6" id="h-sub"></p>

<div class="stat-row" id="stat-row" style="display:none">
  <div class="stat"><span id="stat-sessions">0</span><div class="label" id="h-sessions-lbl"></div></div>
  <div style="width:1px;background:rgba(255,255,255,.1)"></div>
  <div class="stat"><span id="stat-minutes">0</span><div class="label" id="h-minutes-lbl"></div></div>
</div>

<div class="home-cards">
  <div class="home-card home-card-teal" onclick="navigate('breathe')">
    <div class="card-row">
      <div class="icon-box" style="background:rgba(94,234,212,.08)">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(94,234,212,.7)" stroke-width="1.8" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <button class="info-btn" onclick="event.stopPropagation();showInfo()" aria-label="Info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </button>
    </div>
    <h2 id="h-cc-title"></h2>
    <p id="h-cc-desc"></p>
  </div>

  <div class="home-card home-card-purple" onclick="navigate('meditate')">
    <div class="icon-box" style="background:rgba(167,139,250,.08);margin-bottom:12px">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(167,139,250,.7)" stroke-width="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <h2 id="h-med-title"></h2>
    <p id="h-med-desc"></p>
  </div>

  <div class="quick-grid">
    <div class="quick-card" onclick="quickStart(5,0,5,3)">
      <div class="emoji">🫁</div>
      <p style="font-size:12px;font-weight:400;color:rgba(255,255,255,.6)" id="h-q1"></p>
      <p style="font-size:10px;color:var(--text-dim);margin-top:2px" id="h-q1d"></p>
    </div>
    <div class="quick-card" onclick="quickStart(4,7,8,10)">
      <div class="emoji">😴</div>
      <p style="font-size:12px;font-weight:400;color:rgba(255,255,255,.6)" id="h-q2"></p>
      <p style="font-size:10px;color:var(--text-dim);margin-top:2px" id="h-q2d"></p>
    </div>
  </div>
</div>
<div class="quote" id="h-quote"></div>

  </div>

  <!-- ══ BREATHE ══ -->

  <div class="page" id="page-breathe">

let audioCtx=null, masterGain=null, activeNodes=[], bellsTimeout=null, currentSoundId='none';

/* ── VRAIS SONS (Pixabay CDN — licence Pixabay Content License, libre d'utilisation) ── */

/* Appelé synchronement depuis chaque bouton qui peut jouer du son */
function unlockAudio(){
  if(!audioCtx){
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      masterGain=audioCtx.createGain();
      masterGain.gain.value=0.7;
      masterGain.connect(audioCtx.destination);
    }catch(e){ return false; }
  }
  if(audioCtx.state==='suspended'){
    // Appel synchrone impératif sur iOS
    audioCtx.resume();
  }
  return audioCtx.state!=='closed';
}

function makeNoise(type){
  if(!audioCtx) return null;
  const sr=audioCtx.sampleRate, len=sr*4;
  const buf=audioCtx.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  if(type==='white'){
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  }else if(type==='pink'){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
    }
  }else{
    let last=0;
    for(let i=0;i<len;i++){
      const w=Math.random()*2-1;
      d[i]=(last+0.02*w)/1.02;last=d[i];d[i]*=3.5;
    }
  }
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.loop=true;src.start(0);
  activeNodes.push(src);
  return src;
}

function filt(node,type,freq,Q=1){
  if(!node||!audioCtx) return null;
  const f=audioCtx.createBiquadFilter();
  f.type=type;f.frequency.value=freq;f.Q.value=Q;
  node.connect(f);return f;
}

function mkGain(node,val){
  if(!node||!audioCtx) return null;
  const g=audioCtx.createGain();g.gain.value=val;
  node.connect(g);return g;
}

function lfo(param,rate,depth){
  if(!audioCtx||!param) return;
  const l=audioCtx.createOscillator(),lg=audioCtx.createGain();
  l.frequency.value=rate;lg.gain.value=depth;
  l.connect(lg);lg.connect(param);l.start();
  activeNodes.push(l);
}

function buildSound(id,out){
  if(!audioCtx||!out) return;

  if(id==='rain'){
    // Pluie — inchangé, déjà bon
    const g=mkGain(filt(filt(makeNoise('white'),'highpass',2000,.3),'bandpass',5000,.5),0.4);
    if(g) g.connect(out);
    const g2=mkGain(filt(makeNoise('pink'),'lowpass',800,.8),0.15);
    if(g2) g2.connect(out);

  }else if(id==='ocean'){
    // Vagues : bruit marron filtré avec LFO lent simulant le déferlement
    const wave=()=>{
      const n=makeNoise('brown');
      const lp=filt(n,'lowpass',500,.8);
      const hp=filt(lp,'highpass',60,.5);
      const g=mkGain(hp,0.5);
      if(g){lfo(g.gain,0.09,0.35);g.connect(out);}
    };
    wave();wave(); // deux couches décalées
    // Écume haute fréquence
    const foam=mkGain(filt(makeNoise('pink'),'bandpass',2200,1.5),0.07);
    if(foam){lfo(foam.gain,0.11,0.06);foam.connect(out);}
    // Grondement profond
    const deep=mkGain(filt(makeNoise('brown'),'lowpass',120),0.25);
    if(deep){lfo(deep.gain,0.07,0.18);deep.connect(out);}

  }else if(id==='forest'||id==='fire'||id==='wind'||id==='night'){
    // VRAIS SONS — joués via HTMLAudioElement (iOS compatible, loop natif)
    playRealSound(id);

  }else if(id==='bells'){
    // Bols tibétains — inchangé, déjà bien
    const freqs=[220,293.66,349.23,440,523.25];
    const sched=()=>{
      if(currentSoundId!=='bells'||!audioCtx) return;
      const f=freqs[Math.floor(Math.random()*freqs.length)]*(Math.random()>.5?2:1);
      const osc=audioCtx.createOscillator();const env=audioCtx.createGain();
      osc.type='sine';osc.frequency.value=f;
      env.gain.setValueAtTime(0.12,audioCtx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+4);
      osc.connect(env);env.connect(out);osc.start();osc.stop(audioCtx.currentTime+4.5);
      activeNodes.push(osc);
      bellsTimeout=setTimeout(sched,2000+Math.random()*5000);
    };
    sched();

  }
}

/*
 * iOS FIX CRITIQUE pour les sons :
 * Le problème "son de 1 seconde" vient du fait que stopSound()
 * utilisait async/await et recréait masterGain après un délai —
 * ce qui coupait les nouveaux noeuds déjà connectés.
 * Solution : fade-out propre sans recréer masterGain trop tôt,
 * et conserver les noeuds actifs séparément.
 */

/* ── VRAI SON via HTMLAudioElement ── */
function playRealSound(id){
  stopRealSound();
  const url=REAL_SOUNDS[id];
  if(!url) return;
  const el=new Audio();
  el.crossOrigin='anonymous';
  el.loop=true;
  el.volume=0.7;
  el.preload='auto';
  // iOS: on doit déclencher .play() directement dans l'event handler.
  // playRealSound est appelé depuis buildSound → depuis playSound → depuis onclick. ✓
  el.src=url;
  el.onerror=()=>{
    // Si le fichier ne charge pas, fallback sur la synthèse
    console.warn('Real sound failed, using synth fallback for',id);
    buildSoundSynth(id, masterGain);
  };
  const p=el.play();
  if(p&&p.catch) p.catch(()=>buildSoundSynth(id,masterGain));
  realAudioEl=el;
  // Connecter aussi au masterGain pour le fade (MediaElementSourceNode)
  if(audioCtx){
    try{
      const src=audioCtx.createMediaElementSource(el);
      src.connect(masterGain);
      activeNodes.push({stop:()=>{try{el.pause()}catch{}}});
    }catch(e){
      // Si MediaElementSource déjà créé ou erreur, audio joue quand même via el.volume
    }
  }
}

function stopRealSound(){
  if(realAudioEl){
    try{realAudioEl.pause();realAudioEl.src='';}catch{}
    realAudioEl=null;
  }
}

/* Fallback synthétique pour forest/fire/wind/night si URL échoue */
function buildSoundSynth(id,out){
  if(!audioCtx||!out) return;
  if(id==='forest'){
    const g=mkGain(filt(makeNoise('pink'),'bandpass',1200,2),0.15);
    if(g){lfo(g.gain,0.3,0.1);g.connect(out);}
  }else if(id==='fire'){
    const g=mkGain(filt(makeNoise('brown'),'lowpass',800,.5),0.3);
    if(g){lfo(g.gain,0.15,0.15);g.connect(out);}
  }else if(id==='wind'){
    const n=makeNoise('pink');const bp=filt(n,'bandpass',400,.5);const g=mkGain(bp,0.35);
    if(g){if(bp)lfo(bp.frequency,0.05,200);lfo(g.gain,0.08,0.2);g.connect(out);}
  }else if(id==='night'){
    [136,272,408].forEach(f=>{
      if(!audioCtx) return;
      const osc=audioCtx.createOscillator();const g=audioCtx.createGain();
      osc.type='sine';osc.frequency.value=f;g.gain.value=0.08;
      osc.connect(g);g.connect(out);osc.start();activeNodes.push(osc);
    });
  }
}
function playSound(id){
  // DOIT être appelé depuis un event handler (onclick) pour iOS
  if(!unlockAudio()) return;

  // Fade out l'ancien son
  stopRealSound();
  const oldNodes=[...activeNodes];
  activeNodes=[];
  if(bellsTimeout){clearTimeout(bellsTimeout);bellsTimeout=null;}
  currentSoundId=id;

  if(masterGain){
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value,audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);
  }

  // Arrêter les anciens noeuds après le fade
  setTimeout(()=>{
    oldNodes.forEach(n=>{try{n.stop()}catch{}});
    // Recréer masterGain proprement
    if(audioCtx){
      try{if(masterGain) masterGain.disconnect();}catch{}
      masterGain=audioCtx.createGain();
      masterGain.gain.value=0;
      masterGain.connect(audioCtx.destination);
      if(id!=='none'){
        masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0.7,audioCtx.currentTime+1.2);
        buildSound(id,masterGain);
      }
    }
  },550);
}

function stopSound(){
  if(bellsTimeout){clearTimeout(bellsTimeout);bellsTimeout=null;}
  stopRealSound();
  currentSoundId='none';
  if(!audioCtx||!masterGain) return;
  const nodes=[...activeNodes];activeNodes=[];
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(masterGain.gain.value,audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.8);
  setTimeout(()=>{
    nodes.forEach(n=>{try{n.stop()}catch{}});
    if(audioCtx){
      try{if(masterGain) masterGain.disconnect();}catch{}
      masterGain=audioCtx.createGain();
      masterGain.gain.value=0.7;
      masterGain.connect(audioCtx.destination);
    }
  },900);
}

/* iOS FIX: reprendre l'audio quand l'app revient au premier plan */
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && audioCtx && audioCtx.state==='suspended' && currentSoundId!=='none'){
    audioCtx.resume();
  }
});

/* ══════════════════════════════════════════════
   BREATH SOUND ENGINE — Cohérence Cardiaque
   Son de respiration synchronisé avec les phases
══════════════════════════════════════════════ */
let breathSoundNodes=[];
let breathSoundCtx=null; // utilise le même audioCtx

function startBreathSound(phase, durationSec){
  stopBreathSound();
  if(!audioCtx) return;
  // Réutilise audioCtx existant
  const out=masterGain||audioCtx.destination;
  const now=audioCtx.currentTime;

  // Souffle nasal/buccal : bruit blanc filtré avec enveloppe
  const bufLen=audioCtx.sampleRate*Math.max(durationSec,1);
  const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  // Bruit rose pour texture douce
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<d.length;i++){
    const w=Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
  }
  const src=audioCtx.createBufferSource();
  src.buffer=buf;

  // Filtrage selon la phase
  const lp=audioCtx.createBiquadFilter();
  if(phase==='inhale'){
    lp.type='bandpass';lp.frequency.value=1800;lp.Q.value=1.2;
  }else if(phase==='hold'){
    // Silence doux pendant la rétention
    return;
  }else{
    lp.type='bandpass';lp.frequency.value=800;lp.Q.value=0.8;
  }

  const env=audioCtx.createGain();
  env.gain.setValueAtTime(0,now);

  if(phase==='inhale'){
    // Monte progressivement — inspiration
    env.gain.linearRampToValueAtTime(0.18,now+durationSec*0.15);
    env.gain.linearRampToValueAtTime(0.22,now+durationSec*0.7);
    env.gain.linearRampToValueAtTime(0,now+durationSec*0.98);
  }else{
    // Descend progressivement — expiration plus longue et douce
    env.gain.linearRampToValueAtTime(0.15,now+durationSec*0.08);
    env.gain.linearRampToValueAtTime(0.18,now+durationSec*0.3);
    env.gain.linearRampToValueAtTime(0.05,now+durationSec*0.85);
    env.gain.linearRampToValueAtTime(0,now+durationSec*0.98);
  }

  src.connect(lp);lp.connect(env);env.connect(out);
  src.start(now);
  src.stop(now+durationSec+0.1);
  breathSoundNodes=[src,env,lp];
}

function stopBreathSound(){
  breathSoundNodes.forEach(n=>{try{n.stop?n.stop():n.disconnect()}catch{}});
  breathSoundNodes=[];
}

/* ══════════════════════════════════════════════
   BREATHING ENGINE
══════════════════════════════════════════════ */
let breatheInhale=5,breatheHold=0,breatheExhale=5,breatheDuration=5;
let breatheRunning=false,breatheCancelled=false;
let breatheCountdownInterval=null,breathePhase='idle';
let breatheTotalLeft=0,breatheCycles=0;

function breatheToggle(){
  unlockAudio(); // iOS: synchrone
  breatheRunning ? breatheStop() : breatheStart();
}

function breatheStart(){
  breatheCancelled=false;breatheRunning=true;
  breatheTotalLeft=breatheDuration*60;breatheCycles=0;
  document.getElementById('breathe-play').innerHTML=pauseIcon();
  document.getElementById('breathe-reset').style.display='flex';
  document.getElementById('session-timer-wrap').style.display='block';
  document.getElementById('settings-toggle').disabled=true;
  closeSettings();

  // iOS FIX: drift compensation avec Date.now()
  let lastTick=Date.now();
  breatheCountdownInterval=setInterval(()=>{
    const now=Date.now();
    const ticks=Math.max(1,Math.round((now-lastTick)/1000));
    lastTick=now;
    breatheTotalLeft=Math.max(0,breatheTotalLeft-ticks);
    updateSessionTimer();
    if(breatheTotalLeft<=0){
      breatheStop();
      const pattern=breatheHold>0?`${breatheInhale}-${breatheHold}-${breatheExhale}`:`${breatheInhale}-${breatheExhale}`;
      saveSession('breathing',breatheDuration*60,pattern);
    }
  },1000);

  runBreatheCycle();
}

function breatheStop(){
  breatheCancelled=true;breatheRunning=false;
  clearInterval(breatheCountdownInterval);
  breathePhase='idle';
  setBreathUI('idle',0);
  stopBreathSound();
  document.getElementById('breathe-play').innerHTML=playIcon();
  document.getElementById('breathe-reset').style.display='none';
  document.getElementById('session-timer-wrap').style.display='none';
  document.getElementById('settings-toggle').disabled=false;
}

function breatheReset(){ breatheStop(); }

async function runBreatheCycle(){
  while(!breatheCancelled){
    breathePhase='inhale';
    if(!await breatheCountdown(breatheInhale)) break;
    if(breatheHold>0){
      breathePhase='hold';
      if(!await breatheCountdown(breatheHold)) break;
    }
    breathePhase='exhale';
    if(!await breatheCountdown(breatheExhale)) break;
    breatheCycles++;
  }
}

function breatheCountdown(seconds){
  return new Promise(resolve=>{
    let rem=seconds;
    setBreathUI(breathePhase,rem);
    if(breatheCancelled){resolve(false);return;}
    let lastTick=Date.now();
    const id=setInterval(()=>{
      if(breatheCancelled){clearInterval(id);resolve(false);return;}
      const now=Date.now();
      rem-=Math.max(1,Math.round((now-lastTick)/1000));
      lastTick=now;
      if(rem<0) rem=0;
      setBreathUI(breathePhase,rem);
      if(rem<=0){clearInterval(id);resolve(true);}
    },1000);
  });
}

function setBreathUI(phase,timeLeft){
  const circle=document.getElementById('breath-circle');
  const label=document.getElementById('phase-label');
  const timerEl=document.getElementById('phase-timer');
  const r1=document.getElementById('ring1');
  const r2=document.getElementById('ring2');

  label.textContent=phase==='idle'?t('ready'):phase==='inhale'?t('inhale'):phase==='hold'?t('hold'):t('exhale');
  timerEl.textContent=phase!=='idle'?timeLeft+'s':'';

  // Son de respiration : déclenché uniquement au début de chaque phase (timeLeft == durée totale)
  const isPhaseStart=(
    (phase==='inhale'  && timeLeft===breatheInhale) ||
    (phase==='hold'    && timeLeft===breatheHold)   ||
    (phase==='exhale'  && timeLeft===breatheExhale)
  );
  if(breatheRunning && isPhaseStart && audioCtx){
    const dur=phase==='inhale'?breatheInhale:phase==='hold'?breatheHold:breatheExhale;
    startBreathSound(phase, dur);
  }
  if(phase==='idle') stopBreathSound();

  circle.className='breath-circle';
  if(phase==='inhale'){circle.classList.add('inhale');circle.style.transform='scale(1)';r1.style.transform='scale(1.3)';r2.style.transform='scale(1.15)';}
  else if(phase==='hold'){circle.classList.add('hold');circle.style.transform='scale(1)';}
  else if(phase==='exhale'){circle.classList.add('exhale');circle.style.transform='scale(.55)';r1.style.transform='scale(.7)';r2.style.transform='scale(.65)';}
  else{circle.style.transform='scale(.6)';r1.style.transform='scale(.7)';r2.style.transform='scale(.65)';}

  const dur=phase==='inhale'?breatheInhale:phase==='hold'?breatheHold:breatheExhale;
  circle.style.transition=`transform ${dur||0.5}s ease-in-out, background 0.8s`;
  r1.style.transition=`transform ${dur||0.5}s ease-in-out`;
  r2.style.transition=`transform ${dur||0.5}s ease-in-out`;

  if(breatheRunning) document.getElementById('cycle-label').textContent=t('cycle')+' '+(breatheCycles+1);
}

function updateSessionTimer(){
  const m=Math.floor(breatheTotalLeft/60),s=breatheTotalLeft%60;
  document.getElementById('session-timer-disp').textContent=
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* ══════════════════════════════════════════════
   MEDITATION ENGINE

let mDuration=10,mRunning=false,mTimeLeft=600,mInterval=null,mSound='none';
const CIRC=2*Math.PI*120;

function meditateToggle(){
  unlockAudio(); // iOS: synchrone, AVANT tout
  if(mRunning){meditateStop();stopSound();}
  else{meditateStart();}
}

function meditateStart(){
  mRunning=true;
  document.getElementById('meditate-play').innerHTML=pauseIcon();
  document.getElementById('meditate-reset').style.display='flex';
  document.getElementById('m-dur-section').style.display='none';
  document.getElementById('m-sound-section').style.display='none';
  document.getElementById('timer-sub-lbl').textContent=t('remaining');
  // iOS FIX: playSound appelé ici car on est dans le même event handler que meditateToggle
  playSound(mSound);
  let lastTick=Date.now();
  mInterval=setInterval(()=>{
    const now=Date.now();
    const ticks=Math.max(1,Math.round((now-lastTick)/1000));
    lastTick=now;
    mTimeLeft=Math.max(0,mTimeLeft-ticks);
    updateTimerUI();
    if(mTimeLeft<=0){
      meditateStop();stopSound();
      saveSession('meditation',mDuration*60,null);
    }

}

function meditateStop(){

  document.getElementById('m-dur-section').style.display='block';
  document.getElementById('m-sound-section').style.display='block';
  document.getElementById('timer-sub-lbl').textContent='';

function setMDuration(d){

function updateTimerUI(){

  document.getElementById('timer-disp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const prog=mDuration>0?(mDuration*60-mTimeLeft)/(mDuration*60):0;
  document.getElementById('timer-ring').style.strokeDashoffset=CIRC*(1-prog);

function selectSound(id){

  document.querySelectorAll('.sound-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===id));

function getSessions(){try{return JSON.parse(SafeStorage.get('rr-sessions')||'[]')}catch{return[]}}

function saveSession(type,durSec,pattern){
  const s=getSessions();
  s.unshift({type,durSec,pattern,completed:true,date:new Date().toISOString()});
  SafeStorage.set('rr-sessions',JSON.stringify(s.slice(0,200)));
  updateHomeStats();
}

function updateHomeStats(){
  const s=getSessions();
  const totalMin=Math.round(s.reduce((a,x)=>a+x.durSec,0)/60);
  document.getElementById('stat-sessions').textContent=s.length;
  document.getElementById('stat-minutes').textContent=totalMin;
  document.getElementById('stat-row').style.display=s.length?'flex':'none';
}

function renderHistory(){
  const sessions=getSessions();
  const totalMin=Math.round(sessions.reduce((a,x)=>a+x.durSec,0)/60);
  const nBreathe=sessions.filter(s=>s.type==='breathing').length;
  document.getElementById('hi-total').textContent=sessions.length;
  document.getElementById('hi-minutes').textContent=totalMin;
  document.getElementById('hi-breathe').textContent=nBreathe;
  const list=document.getElementById('session-list');
  if(!sessions.length){
    list.innerHTML=`<div class="empty-state"><p>${t('noSessions')}</p><small>${t('startFirst')}</small></div>`;
    return;
  }
  list.innerHTML=sessions.map(s=>{
    const d=new Date(s.date);
    const dateStr=d.toLocaleDateString(lang==='fr'?'fr-FR':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const min=Math.round(s.durSec/60);
    const typeLabel=s.type==='breathing'?t('breathing'):t('meditation');
    const patStr=s.pattern?` <span style="color:var(--text-dim);font-size:11px">(${s.pattern})</span>`:'';
    const ic=s.type==='breathing'?'rgba(94,234,212,.6)':'rgba(167,139,250,.6)';
    return `<div class="session-item">
      <div class="s-icon ${s.type==='breathing'?'breathe':'meditate'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${ic}" stroke-width="1.8" width="15" height="15">
          ${s.type==='breathing'?'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>':'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'}
        </svg>
      </div>
      <div class="s-info">
        <div class="s-type">${typeLabel}${patStr}</div>
        <div class="s-meta">${min} min · ${dateStr}</div>
      </div>
      ${s.completed?`<div class="s-badge">${t('done')}</div>`:''}
    </div>`;
  }).join('');
}

  document.getElementById('inhale-val').textContent=breatheInhale+'s';
  document.getElementById('hold-val').textContent=breatheHold+'s';
  document.getElementById('exhale-val').textContent=breatheExhale+'s';
}
function patternStr(){return breatheHold>0?`${breatheInhale}-${breatheHold}-${breatheExhale}`:`${breatheInhale}-${breatheExhale}`;}
function updatePresetHighlight(){
  document.querySelectorAll('.preset-btn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.i)===breatheInhale&&parseInt(b.dataset.h)===breatheHold&&parseInt(b.dataset.e)===breatheExhale);
  });
}

/* ══════════════════════════════════════════════
   ICONS
══════════════════════════════════════════════ */
function playIcon(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="24" height="24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;}
function pauseIcon(){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="24" height="24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;}

/* ══════════════════════════════════════════════
   RENDER ALL (i18n + init UI)
══════════════════════════════════════════════ */
function renderPresets(){
  const presets=[
    {key:'coherence',i:5,h:0,e:5},{key:'relaxing',i:4,h:7,e:8},
    {key:'energizing',i:6,h:0,e:2},{key:'box',i:4,h:4,e:4}
  ];
  document.getElementById('preset-grid').innerHTML=presets.map(p=>`
    <button class="preset-btn" data-i="${p.i}" data-h="${p.h}" data-e="${p.e}"
      onclick="applyPreset(${p.i},${p.h},${p.e})">
      <span>${t(p.key)}</span><small>${t(p.key+'D')}</small>
    </button>`).join('');
  updatePresetHighlight();
}
function applyPreset(i,h,e){
  breatheInhale=i;breatheHold=h;breatheExhale=e;
  document.getElementById('inhale-range').value=i;
  document.getElementById('hold-range').value=h;
  document.getElementById('exhale-range').value=e;
  updateSliderDisplays();updatePresetHighlight();
  document.getElementById('b-pattern-sub').textContent=patternStr();
}
function renderDurPills(){
  document.getElementById('dur-pills').innerHTML=
    [3,5,10,20].map(d=>`<button class="dur-pill${breatheDuration===d?' active':''}" onclick="setBDuration(${d})">${d} min</button>`).join('');
}
function setBDuration(d){
  breatheDuration=d;
  document.querySelectorAll('#dur-pills .dur-pill').forEach(b=>b.classList.toggle('active',b.textContent===d+' min'));
}
function renderMDurPills(){
  document.getElementById('m-dur-pills').innerHTML=
    [5,10,15,20,30,45,60].map(d=>`<button class="dur-pill m-dur-pill${mDuration===d?' active':''}" data-d="${d}" onclick="setMDuration(${d})">${d} min</button>`).join('');
}
function renderSoundGrid(){
  const sounds=[
    {id:'none',emoji:'🔇',key:'silence'},{id:'rain',emoji:'🌧️',key:'rain'},
    {id:'ocean',emoji:'🌊',key:'ocean'},{id:'forest',emoji:'🐦',key:'forest'},
    {id:'fire',emoji:'🔥',key:'fire'},{id:'wind',emoji:'🍃',key:'wind'},
    {id:'bells',emoji:'🔔',key:'bells'},{id:'night',emoji:'🕉️',key:'night'},
  ];
  document.getElementById('sound-grid').innerHTML=sounds.map(s=>`
    <button class="sound-btn${mSound===s.id?' active':''}" data-s="${s.id}" onclick="selectSound('${s.id}')">
      <span class="s-emoji">${s.emoji}</span>
      <span class="s-name">${t(s.key)}</span>
    </button>`).join('');
}
function renderWaveBars(){
  const wb=document.getElementById('wave-bars');
  if(!wb||wb.children.length) return;
  const h=[8,14,22,30,36,40,36,30,22,14,8,18,28,38,32,20,10,16,26,36];
  wb.innerHTML=h.map((v,i)=>`<div class="wave-bar" style="height:${v}px;animation-delay:${i*.1}s"></div>`).join('');
}

function renderAll(){
  document.getElementById('lang-btn').textContent=lang==='fr'?'EN':'FR';
  // Home
  document.getElementById('h-find').innerHTML=`${t('findYour')} <span class="grad">${t('calm')}</span>`;
  document.getElementById('h-sub').textContent=t('sub');
  document.getElementById('h-sessions-lbl').textContent=t('sessions');
  document.getElementById('h-minutes-lbl').textContent=t('minutes');
  document.getElementById('h-cc-title').textContent=t('ccTitle');
  document.getElementById('h-cc-desc').textContent=t('ccDesc');
  document.getElementById('h-med-title').textContent=t('medTitle');
  document.getElementById('h-med-desc').textContent=t('medDesc');
  document.getElementById('h-q1').textContent=t('q1');
  document.getElementById('h-q1d').textContent=t('q1d');
  document.getElementById('h-q2').textContent=t('q2');
  document.getElementById('h-q2d').textContent=t('q2d');
  document.getElementById('h-quote').textContent=t('quote');
  // Breathe
  document.getElementById('b-title').textContent=t('ccTitle');
  document.getElementById('b-pattern-sub').textContent=patternStr();
  document.getElementById('b-pattern-lbl').textContent=t('pattern');
  document.getElementById('b-inhale-lbl').textContent=t('inhale');
  document.getElementById('b-hold-lbl').textContent=t('hold');
  document.getElementById('b-exhale-lbl').textContent=t('exhale');
  document.getElementById('b-dur-lbl').textContent=t('dur');
  updateSliderDisplays();renderPresets();renderDurPills();setBreathUI('idle',0);
  // Meditate
  document.getElementById('m-title').textContent=t('medTitle');
  document.getElementById('m-sub').textContent=t('medDesc');
  document.getElementById('m-dur-lbl').textContent=t('dur');
  document.getElementById('m-sound-lbl').textContent=t('sound');
  renderMDurPills();renderSoundGrid();updateTimerUI();
  // History labels
  document.getElementById('hi-title').textContent=t('hiTitle');
  document.getElementById('hi-sub').textContent=t('hiSub');
  document.getElementById('hi-sessions-lbl').textContent=t('sessions');
  document.getElementById('hi-minutes-lbl').textContent=t('minutes');
  document.getElementById('hi-breathe-lbl').textContent=t('breathing');
  // Info
  document.getElementById('i-title').textContent=t('iTitle');
  document.getElementById('i-sub').textContent=t('iSub');
  document.getElementById('i-benefits-title').textContent=t('benefits');
  document.getElementById('i-cta').textContent=t('cta');
  // Nav
  document.getElementById('nav-home-lbl').textContent=t('home');
  document.getElementById('nav-breathe-lbl').textContent=t('breathe');
  document.getElementById('nav-meditate-lbl').textContent=t('meditate');
  document.getElementById('nav-history-lbl').textContent=t('history');
  updateHomeStats();
  renderWaveBars();
}

/* ── INIT ── */
renderAll();
</script>
